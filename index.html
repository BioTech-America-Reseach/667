<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏥 MEDISCAN TIBU • MATOKEO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0a0f1e;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: #0f172a;
            border: 2px solid #3b82f6;
            border-radius: 30px;
            padding: 20px;
        }
        .scanner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #3b82f6;
        }
        .scanner-title {
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .progress-container {
            width: 80%;
            max-width: 500px;
            height: 30px;
            background: #1e293b;
            border-radius: 15px;
            border: 2px solid #3b82f6;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.3s;
        }
        .time-remaining {
            font-size: 3rem;
            font-family: monospace;
            margin: 20px 0;
        }
        .scanner-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #3b82f6;
            color: white;
        }
        .title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #3b82f6;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #3b82f6;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .input-section {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #334155;
        }
        .section-title {
            color: #3b82f6;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            color: #94a3b8;
            display: block;
            margin-bottom: 5px;
        }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 10px;
            color: white;
        }
        .xray-section {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #334155;
        }
        .xray-container {
            display: flex;
            gap: 20px;
        }
        .xray-image {
            width: 300px;
            height: 400px;
            background: #000;
            border-radius: 10px;
            position: relative;
            border: 2px solid #3b82f6;
        }
        .dot-overlay {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .dot {
            position: absolute;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 1s infinite;
        }
        .results-section {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #334155;
        }
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .category-btn {
            padding: 10px 20px;
            border-radius: 30px;
            background: #0f172a;
            border: 2px solid #334155;
            color: #94a3b8;
            cursor: pointer;
        }
        .category-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        .category-content {
            display: none;
        }
        .category-content.active {
            display: block;
        }
        .result-card {
            background: #0f172a;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 5px solid;
        }
        .result-card.modern { border-left-color: #3b82f6; }
        .result-card.traditional { border-left-color: #f59e0b; }
        .result-card.spiritual { border-left-color: #8b5cf6; }
        .result-title {
            color: white;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .result-source {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .result-explanation {
            color: #cbd5e1;
            font-size: 0.95rem;
            margin-bottom: 10px;
        }
        .doctor-section {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #334155;
        }
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #3b82f6;
            color: #3b82f6;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1e293b;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            color: white;
            border: 2px solid #3b82f6;
        }
        .modal-close {
            float: right;
            font-size: 2rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SCANNER OVERLAY -->
        <div class="scanner-overlay" id="scannerOverlay" style="display: none;">
            <div class="scanner-title">🔬 CLINICAL DIAGNOSTIC SCAN</div>
            <div class="progress-container">
                <div class="progress-bar" id="scanProgress"></div>
            </div>
            <div class="time-remaining" id="timeRemaining">01:00</div>
            <div class="scanning-text" id="scanningText">Inaanza...</div>
        </div>

        <!-- HEADER -->
        <div class="scanner-header">
            <div class="title">🏥 MEDISCAN TIBU</div>
            <div class="status">
                <div class="led"></div>
                <span>DR WILLIMA</span>
            </div>
        </div>

        <!-- INPUT SECTION -->
        <div class="main-grid">
            <div class="input-section">
                <div class="section-title">📝 TAARIFA ZA MGONJWA</div>
                <div class="input-group">
                    <label>JINA KAMILI</label>
                    <input type="text" id="patientName" value="Juma Baraka">
                </div>
                <div class="input-group">
                    <label>JINSIA</label>
                    <select id="gender">
                        <option value="male">Me</option>
                        <option value="female">Ke</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>UMRI</label>
                    <input type="number" id="age" value="42">
                </div>
                <div class="input-group">
                    <label>TAREHE YA KUZALIWA</label>
                    <input type="date" id="birthDate" value="1983-06-15">
                </div>
            </div>
            <div class="input-section">
                <div class="section-title">❤️ VIASHIRIA</div>
                <div class="input-group">
                    <label>UZITO (kg)</label>
                    <input type="number" id="weight" value="78">
                </div>
                <div class="input-group">
                    <label>UREFU (cm)</label>
                    <input type="number" id="height" value="172">
                </div>
                <div class="input-group">
                    <label>BP (systolic)</label>
                    <input type="number" id="bpSystolic" value="128">
                </div>
                <div class="input-group">
                    <label>BP (diastolic)</label>
                    <input type="number" id="bpDiastolic" value="82">
                </div>
            </div>
        </div>

        <!-- X-RAY SIMPLE -->
        <div class="xray-section">
            <div class="section-title">🩻 X-RAY • MAENEO YALIYOATHIRIKA</div>
            <div class="xray-container">
                <div class="xray-image" style="background: #0f172a; display: flex; justify-content: center; align-items: center;">
                    <div style="color: #3b82f6; font-size: 3rem;">🩻</div>
                    <div class="dot-overlay" id="dotOverlay" style="position: absolute; width: 100%; height: 100%;"></div>
                </div>
                <div style="flex: 1; color: #94a3b8; padding: 20px;">
                    <p>Matokeo yataonekana hapa chini</p>
                </div>
            </div>
        </div>

        <!-- RESULTS -->
        <div class="results-section">
            <div class="section-title">🔬 MATOKEO</div>
            <div class="category-tabs">
                <div class="category-btn modern active" onclick="switchCategory('modern')">🧬 Kisasa</div>
                <div class="category-btn traditional" onclick="switchCategory('traditional')">🌿 Asili</div>
                <div class="category-btn spiritual" onclick="switchCategory('spiritual')">🔮 Kiroho</div>
            </div>
            <div id="category-modern" class="category-content active">
                <div id="modernResults"></div>
            </div>
            <div id="category-traditional" class="category-content">
                <div id="traditionalResults"></div>
            </div>
            <div id="category-spiritual" class="category-content">
                <div id="spiritualResults"></div>
            </div>
        </div>

        <!-- DOCTOR -->
        <div class="doctor-section">
            <div class="section-title">📋 MAELEZO YA DAKTARI</div>
            <textarea class="doctor-input" id="doctorNotes" rows="3" style="width:100%; background:#0f172a; border:2px solid #334155; border-radius:10px; padding:10px; color:white;"></textarea>
            <div class="button-group">
                <button class="btn btn-outline" onclick="printReport()">🖨️ CHAPISHA</button>
                <button class="btn btn-primary" onclick="startScan()">🔬 ANZA SCAN</button>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="infoModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-data" id="modalData"></div>
        </div>
    </div>

    <script>
        // DATA
        const allResults = {
            modern: [
                { title: "HFE mutation - Hemochromatosis", source: "DNA Analysis", points: 845, explanation: "Vinasaba vya kufyonza chuma kupita kiasi. Hii inaweza kudhuru ini na moyo.", bodyPart: [0.5, 0.5] },
                { title: "Kyphosis - Thoracic 60°", source: "X-ray", points: 780, explanation: "Uti wa mgongo umepinda. Pembe ya 60° inaonyesha mkao mbaya au udhaifu wa mifupa.", bodyPart: [0.5, 0.3] },
                { title: "Thrombotic post-COVID", source: "N3C", points: 890, explanation: "Dalili za damu kuganda zilizosalia baada ya COVID-19.", bodyPart: [0.4, 0.3] },
                { title: "Rheumatoid Arthritis", source: "PCORnet", points: 825, explanation: "Uvimbe mkali kwenye viungo. DAS28 5.2 inaonyesha hatua kali.", bodyPart: [0.5, 0.7] },
                { title: "UTI - E. coli", source: "TriNetX", points: 760, explanation: "Maambukizi ya mkojo yanayosababishwa na E. coli. (>100k CFU).", bodyPart: [0.5, 0.4] },
                { title: "Plantar Fasciitis", source: "OBIA", points: 715, explanation: "Maumivu ya unyayo (heel pain).", bodyPart: [0.5, 0.9] }
            ],
            traditional: [
                { title: "Phlegmatic Temperament", source: "Unani", points: 825, explanation: "Asili ya 'Baridi na Unyevu'. Husababisha mwili kuwa mzito na kamasi nyingi.", bodyPart: [0.4, 0.3] },
                { title: "Prana Disturbance", source: "Vedas", points: 795, explanation: "Nishati ya uhai (Prana) haiko sawa. Husababisha matatizo ya kupumua.", bodyPart: [0.4, 0.3] },
                { title: "Vata Imbalance", source: "Ayurveda", points: 850, explanation: "Nishati ya mwendo imevurugika. Husababisha wasiwasi na viungo kuuma.", bodyPart: [0.5, 0.7] },
                { title: "Liver Qi Stagnation", source: "Chinese", points: 815, explanation: "Nishati ya ini imekwama. Husababisha kuwashwa na maumivu ya kichwa.", bodyPart: [0.5, 0.4] }
            ],
            spiritual: [
                { title: "Envy (Wivu)", source: "African", points: 865, explanation: "Nishati ya wivu inakuelekea. Unahitaji kinga.", bodyPart: [0.5, 0.2] },
                { title: "Cord Cutting", source: "Mystical", points: 835, explanation: "Mafungamano ya kihisia na watu wenye sumu. Kata kamba ya kiroho.", bodyPart: [0.5, 0.5] },
                { title: "Ancestral Imbalance", source: "African", points: 890, explanation: "Usawa na mizazi umevurugika. Fanya matambiko.", bodyPart: [0.5, 0.5] },
                { title: "Evil Eye (Choyo)", source: "African", points: 820, explanation: "Jicho baya. Unahitaji hirizi.", bodyPart: [0.5, 0.2] }
            ]
        };

        // Variables
        let scanInterval;
        let scanTime = 60;
        let resultsByCategory = { modern: [], traditional: [], spiritual: [] };
        let modernIndex = 0, traditionalIndex = 0, spiritualIndex = 0;

        // Seeded random
        function seededRandom(seed) {
            let h = 0;
            for (let i = 0; i < seed.length; i++) {
                h = ((h << 5) - h + seed.charCodeAt(i)) | 0;
            }
            return function() {
                h = (h * 9301 + 49297) % 233280;
                return h / 233280;
            };
        }

        // Select random results
        function selectRandomResults(category, patientName, count = 4) {
            const list = allResults[category];
            const rand = seededRandom(patientName + category);
            const shuffled = [...list];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(rand() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, count);
        }

        // Start scan
        function startScan() {
            const patientName = document.getElementById('patientName').value || 'Default';
            
            // Clear previous
            if (scanInterval) clearInterval(scanInterval);
            
            // Select new results
            resultsByCategory = {
                modern: selectRandomResults('modern', patientName, 4),
                traditional: selectRandomResults('traditional', patientName, 4),
                spiritual: selectRandomResults('spiritual', patientName, 4)
            };
            
            modernIndex = 0;
            traditionalIndex = 0;
            spiritualIndex = 0;
            scanTime = 60;
            
            // Clear display
            document.getElementById('modernResults').innerHTML = '';
            document.getElementById('traditionalResults').innerHTML = '';
            document.getElementById('spiritualResults').innerHTML = '';
            document.getElementById('dotOverlay').innerHTML = '';
            
            // Show overlay
            document.getElementById('scannerOverlay').style.display = 'flex';
            document.getElementById('scanProgress').style.width = '0%';
            document.getElementById('timeRemaining').textContent = '01:00';
            
            // Start timer
            scanInterval = setInterval(updateScan, 1000);
        }

        function updateScan() {
            scanTime--;
            const mins = Math.floor(scanTime / 60);
            const secs = scanTime % 60;
            document.getElementById('timeRemaining').textContent = 
                `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            document.getElementById('scanProgress').style.width = ((60 - scanTime)/60*100) + '%';
            
            // Show results every 15 seconds
            if (scanTime === 45 && modernIndex < resultsByCategory.modern.length) {
                addResult('modern', resultsByCategory.modern[modernIndex++]);
            }
            if (scanTime === 30 && traditionalIndex < resultsByCategory.traditional.length) {
                addResult('traditional', resultsByCategory.traditional[traditionalIndex++]);
            }
            if (scanTime === 15 && spiritualIndex < resultsByCategory.spiritual.length) {
                addResult('spiritual', resultsByCategory.spiritual[spiritualIndex++]);
            }
            if (scanTime === 0) {
                // Add remaining results
                while (modernIndex < resultsByCategory.modern.length) {
                    addResult('modern', resultsByCategory.modern[modernIndex++]);
                }
                while (traditionalIndex < resultsByCategory.traditional.length) {
                    addResult('traditional', resultsByCategory.traditional[traditionalIndex++]);
                }
                while (spiritualIndex < resultsByCategory.spiritual.length) {
                    addResult('spiritual', resultsByCategory.spiritual[spiritualIndex++]);
                }
                
                clearInterval(scanInterval);
                document.getElementById('scannerOverlay').style.display = 'none';
            }
        }

        function addResult(category, result) {
            const container = document.getElementById(category + 'Results');
            const card = document.createElement('div');
            card.className = `result-card ${category}`;
            card.innerHTML = `
                <div class="result-title">${result.title}</div>
                <div class="result-source">📊 ${result.source} • ${result.points} pts</div>
                <div class="result-explanation">${result.explanation}</div>
                <div class="result-footer" style="text-align:right;">
                    <span style="color:#3b82f6; cursor:pointer;" onclick='showDetails(${JSON.stringify(result).replace(/'/g, "\\'")})'>🔍 Maelezo</span>
                </div>
            `;
            container.appendChild(card);
            
            // Add dot
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.left = (result.bodyPart[0]*100)+'%';
            dot.style.top = (result.bodyPart[1]*100)+'%';
            dot.style.background = category === 'modern' ? '#3b82f6' : category === 'traditional' ? '#f59e0b' : '#8b5cf6';
            document.getElementById('dotOverlay').appendChild(dot);
        }

        function showDetails(result) {
            document.getElementById('modalTitle').innerHTML = result.title;
            document.getElementById('modalData').innerHTML = `
                <p><strong>Chanzo:</strong> ${result.source}</p>
                <p><strong>Pointi:</strong> ${result.points}</p>
                <p><strong>Maelezo:</strong> ${result.explanation}</p>
                <p><strong>Tiba:</strong> Fuatiliwa na daktari</p>
            `;
            document.getElementById('infoModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('infoModal').style.display = 'none';
        }

        function switchCategory(cat) {
            document.querySelectorAll('.category-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('category-'+cat).classList.add('active');
            event.target.classList.add('active');
        }

        function printReport() {
            window.print();
        }

        // Load default
        window.addEventListener('load', () => {
            document.getElementById('scannerOverlay').style.display = 'none';
        });
    </script>
</body>
</html>
